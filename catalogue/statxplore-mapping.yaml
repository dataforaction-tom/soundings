# catalogue/statxplore-mapping.yaml — bind soundings indicator keys to
# DWP Stat-Xplore cube queries.
#
# Cube identifiers (`database`, `measures`, `dimensions`, `recodes`) are
# long strings that must match Stat-Xplore's internal schema exactly.
# Discovery requires the API key (the `/schema` endpoint returns 503
# without auth). Entries are pinned plausible-but-unverified until
# the live test (Task 16) confirms — likely needs adjustment per
# entry against the real cube once `STATXPLORE_API_KEY` is set.
#
# `geography_dim` is the dimension we filter on by place_id; the
# adapter recodes it per request. `date_dim` is the time axis used
# by fetch_trend.
#
# Geography hierarchy IDs vary per cube. The value template uses
# `{place_code}` which the adapter substitutes (e.g. E06000004).

mappings:

  - indicator_key: economy.universal_credit_claimants
    database: "str:database:UC_Monthly"
    measures:
      - "str:count:UC_Monthly:V_F_UC_CASELOAD_FULL"
    geography_dim: "str:field:UC_Monthly:V_F_UC_CASELOAD_FULL:GEOGRAPHY"
    geography_value_template:
      "str:value:UC_Monthly:V_F_UC_CASELOAD_FULL:GEOGRAPHY:V_C_MASTERGEOG11_UTLA_TO_NATIONAL:{place_code}"
    date_dim: "str:field:UC_Monthly:V_F_UC_CASELOAD_FULL:DATE_NAME"
    place_type: ltla24
    unit: "people"

  - indicator_key: economy.claimant_count_rate
    database: "str:database:cc_quarterly"
    measures:
      - "str:count:cc_quarterly:V_F_CC_QUARTERLY"
    geography_dim: "str:field:cc_quarterly:V_F_CC_QUARTERLY:GEOGRAPHY"
    geography_value_template:
      "str:value:cc_quarterly:V_F_CC_QUARTERLY:GEOGRAPHY:V_C_MASTERGEOG11_UTLA_TO_NATIONAL:{place_code}"
    date_dim: "str:field:cc_quarterly:V_F_CC_QUARTERLY:DATE_NAME"
    place_type: ltla24
    unit: "proportion"
    caveats:
      - "Claimant count includes JSA recipients and UC claimants required to seek work."

  - indicator_key: deprivation.child_poverty_ahc
    database: "str:database:children_in_low_income_families_ahc"
    measures:
      - "str:count:children_in_low_income_families_ahc:V_F_CHILDREN"
    geography_dim:
      "str:field:children_in_low_income_families_ahc:V_F_CHILDREN:GEOGRAPHY"
    geography_value_template:
      "str:value:children_in_low_income_families_ahc:V_F_CHILDREN:GEOGRAPHY:V_C_MASTERGEOG11_UTLA_TO_NATIONAL:{place_code}"
    date_dim:
      "str:field:children_in_low_income_families_ahc:V_F_CHILDREN:DATE_NAME"
    place_type: ltla24
    unit: "proportion"
    caveats:
      - "Local-area child poverty AHC statistics published from FYE 2024 onwards."
