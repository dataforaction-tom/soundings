# Soundings indicator catalogue

# Schema version: 1.0
# Last reviewed: 2026-05-05
# Licence: CC0 (the catalogue itself; underlying data carries its own licences)
#
# This catalogue is the contract between the Soundings server and its consumers.
# Each entry describes one indicator: how it is named, what it measures, where
# it can be reported (geography), how it is sourced, and how to interpret it.
#
# Conventions
# -----------
# - Indicator keys use lowercase dotted namespaces: <domain>.<sub_domain>.<measure>
#   e.g. population.age_structure.under_18, deprivation.imd.score
# - Geography codes follow the canonical Soundings format: <type>:<code>
#   e.g. lsoa21:E01001234, ltla24:E07000223
# - "available_at" lists the geography levels the indicator can be reported at.
#   Soundings refuses to compute a value at a level not in this list rather than
#   silently approximating.
# - "higher_is" expresses the direction of the value for narrative composition.
#   Allowed values: "better", "worse", "neutral", or null where direction depends
#   on context (e.g. population total).
# - "confidence" describes the typical kind of evidence:
#   "official"     - National Statistic or equivalent
#   "modelled"     - Derived from a model with known methodology
#   "experimental" - Official but flagged as developmental
#   "experiential" - Reserved for v3 (organisational observations); never used here.
# - Schema additions are non-breaking. Removals follow a documented deprecation
#   lifecycle (announce → mark deprecated → remove after one full release cycle).

sources:
  ons.census2021:
    label: "ONS Census 2021"
    publisher: "Office for National Statistics"
    publisher_url: "https://www.ons.gov.uk/"
    dataset_url: "https://www.nomisweb.co.uk/sources/census_2021"
    licence: "OGL-UK-3.0"
    refresh_cadence: "decennial"
    notes: "England and Wales only. Scotland is Scotland's Census 2022 (separate source). NI is Census 2021 NISRA (separate source)."

  ons.aps:
    label: "Annual Population Survey"
    publisher: "Office for National Statistics"
    publisher_url: "https://www.ons.gov.uk/"
    dataset_url: "https://www.nomisweb.co.uk/sources/aps"
    licence: "OGL-UK-3.0"
    refresh_cadence: "quarterly"
    notes: "Survey-based. Confidence intervals matter; small areas have wide CIs."

  ons.mid_year_estimates:
    label: "ONS mid-year population estimates"
    publisher: "Office for National Statistics"
    publisher_url: "https://www.ons.gov.uk/"
    dataset_url: "https://www.ons.gov.uk/peoplepopulationandcommunity/populationandmigration/populationestimates"
    licence: "OGL-UK-3.0"
    refresh_cadence: "annual"

  mhclg.imd2025:
    label: "English Indices of Deprivation 2025"
    publisher: "Ministry of Housing, Communities and Local Government"
    publisher_url: "https://www.gov.uk/mhclg"
    dataset_url: "https://www.gov.uk/government/statistics/english-indices-of-deprivation-2025"
    licence: "OGL-UK-3.0"
    refresh_cadence: "every 5-7 years"
    notes: "Published 30 October 2025, replacing IoD 2019 as the official measure of deprivation in England. Built on 2021 LSOA boundaries. 55 indicators across 7 domains. Outputs less directly comparable to IoD 2019 due to methodology and dataset changes. England only."

  dwp.statxplore:
    label: "DWP Stat-Xplore"
    publisher: "Department for Work and Pensions"
    publisher_url: "https://www.gov.uk/dwp"
    dataset_url: "https://stat-xplore.dwp.gov.uk/"
    licence: "OGL-UK-3.0"
    refresh_cadence: "monthly to quarterly depending on dataset"
    notes: "Open Data API available to registered users. HBAI dataset split (March 2026) into admin-linked (FYE 2022 onwards) and unlinked (FYE 1995-2022) — handle both."

  ohid.fingertips:
    label: "Public Health Profiles (Fingertips)"
    publisher: "Office for Health Improvement and Disparities"
    publisher_url: "https://www.gov.uk/government/organisations/office-for-health-improvement-and-disparities"
    dataset_url: "https://fingertips.phe.org.uk/"
    licence: "OGL-UK-3.0"
    refresh_cadence: "varies by indicator (typically annual)"
    notes: "Hundreds of indicators. Soundings exposes a curated subset; the full set is reachable via the Fingertips API for advanced consumers."

  dfe.explore:
    label: "DfE Explore Education Statistics"
    publisher: "Department for Education"
    publisher_url: "https://www.gov.uk/dfe"
    dataset_url: "https://explore-education-statistics.service.gov.uk/"
    licence: "OGL-UK-3.0"
    refresh_cadence: "annual (most series)"

  mhclg.live_tables:
    label: "MHCLG Live Tables on housing and homelessness"
    publisher: "Ministry of Housing, Communities and Local Government"
    publisher_url: "https://www.gov.uk/mhclg"
    dataset_url: "https://www.gov.uk/government/collections/housing-statistics"
    licence: "OGL-UK-3.0"
    refresh_cadence: "quarterly to annual"

  police_uk:
    label: "data.police.uk"
    publisher: "Home Office / police forces"
    publisher_url: "https://www.police.uk/"
    dataset_url: "https://data.police.uk/docs/"
    licence: "OGL-UK-3.0"
    refresh_cadence: "monthly"
    notes: "Crime data published at street level. Soundings aggregates to LTLA / LSOA21."

  charity_commission:
    label: "Charity Commission for England and Wales register"
    publisher: "Charity Commission for England and Wales"
    publisher_url: "https://www.gov.uk/government/organisations/charity-commission"
    dataset_url: "https://register-of-charities.charitycommission.gov.uk/register/full-register-download"
    licence: "OGL-UK-3.0"
    refresh_cadence: "monthly"

  threesixtygiving:
    label: "360Giving Datastore"
    publisher: "360Giving"
    publisher_url: "https://www.threesixtygiving.org/"
    dataset_url: "https://www.threesixtygiving.org/data/"
    licence: "CC-BY-4.0"
    refresh_cadence: "rolling (publisher-dependent)"
    notes: "Coverage varies by funder. Soundings reports what is published; gaps are surfaced honestly."

  find_that_charity:
    label: "Find That Charity"
    publisher: "Find That Charity (David Kane)"
    publisher_url: "https://findthatcharity.uk/"
    dataset_url: "https://findthatcharity.uk/about"
    licence: "CC-BY-4.0"
    refresh_cadence: "weekly"
    notes: "Aggregator across UK regulators (CCEW, OSCR, CCNI, CIO). Used for cross-jurisdiction lookup."

  postcodes_io:
    label: "postcodes.io"
    publisher: "Ideal Postcodes (community-maintained)"
    publisher_url: "https://postcodes.io/"
    dataset_url: "https://postcodes.io/about"
    licence: "MIT (service); ONS data under OGL"
    refresh_cadence: "quarterly"
    notes: "Postcode → geography resolution. Internal use only; not exposed as a tool directly."

  ons.geography:
    label: "ONS Open Geography Portal"
    publisher: "Office for National Statistics"
    publisher_url: "https://geoportal.statistics.gov.uk/"
    dataset_url: "https://geoportal.statistics.gov.uk/"
    licence: "OGL-UK-3.0"
    refresh_cadence: "as boundaries change"
    notes: "Boundary geometries, code history, lookups. Internal use; underlies the geography spine."

  openaq:
    label: "OpenAQ"
    publisher: "OpenAQ"
    publisher_url: "https://openaq.org/"
    dataset_url: "https://api.openaq.org/v3/"
    licence: "CC-BY-4.0"
    refresh_cadence: "hourly"
    notes: "Aggregates global air quality monitoring data. UK coverage from DEFRA AURN network + local authority monitors. Point sensor data interpolated to place level."

  osm_overpass:
    label: "OpenStreetMap (Overpass API)"
    publisher: "OpenStreetMap contributors"
    publisher_url: "https://www.openstreetmap.org/"
    dataset_url: "https://overpass.atownsend.org.uk/api/interpreter"
    licence: "ODbL-1.0"
    refresh_cadence: "monthly"
    notes: "Amenity counts from OSM tag queries via Overpass API. Britain & Ireland regional instance. ODbL licence requires attribution."

# -----------------------------------------------------------------------------
# Indicators
# -----------------------------------------------------------------------------

indicators:

  # ---------------------------------------------------------------------------
  # Population
  # ---------------------------------------------------------------------------

  - key: population.total
    label: "Total resident population"
    description: "Mid-year estimate of total resident population."
    unit: "people"
    higher_is: null
    source_id: "ons.mid_year_estimates"
    available_at: ["lsoa21", "msoa21", "ward24", "ltla24", "utla24", "region", "country"]
    refresh_cadence: "annual"
    caveats:
      - "Mid-year estimates are revised after each Census. Older years may be rebased."
    related_keys:
      - "population.density"
      - "population.age_structure.under_18"
      - "population.age_structure.over_65"

  - key: population.density
    label: "Population density"
    description: "Resident population per square kilometre."
    unit: "people per km²"
    higher_is: null
    source_id: "ons.mid_year_estimates"
    available_at: ["lsoa21", "msoa21", "ward24", "ltla24", "utla24", "region", "country"]
    refresh_cadence: "annual"
    related_keys:
      - "population.total"

  - key: population.age_structure.under_18
    label: "Population aged under 18"
    description: "Number of residents aged 0–17."
    unit: "people"
    higher_is: null
    source_id: "ons.mid_year_estimates"
    available_at: ["lsoa21", "msoa21", "ward24", "ltla24", "utla24", "region", "country"]
    refresh_cadence: "annual"

  - key: population.age_structure.over_65
    label: "Population aged 65 and over"
    description: "Number of residents aged 65+."
    unit: "people"
    higher_is: null
    source_id: "ons.mid_year_estimates"
    available_at: ["lsoa21", "msoa21", "ward24", "ltla24", "utla24", "region", "country"]
    refresh_cadence: "annual"

  - key: population.ethnicity.non_white_british_share
    label: "Share of population not identifying as 'White: British'"
    description: "Proportion of usual residents identifying as any ethnic group other than 'White: British' (Census 2021 high-level categories)."
    unit: "proportion"
    higher_is: null
    source_id: "ons.census2021"
    available_at: ["lsoa21", "msoa21", "ward24", "ltla24", "utla24", "region", "country"]
    refresh_cadence: "decennial"
    caveats:
      - "Ethnic group categories changed between censuses. Comparisons across decades require care."
      - "England and Wales only. Scotland and NI use separate sources."

  - key: population.households.total
    label: "Total households"
    description: "Number of households."
    unit: "households"
    higher_is: null
    source_id: "ons.census2021"
    available_at: ["lsoa21", "msoa21", "ward24", "ltla24", "utla24", "region", "country"]
    refresh_cadence: "decennial"

  - key: population.households.lone_parent_share
    label: "Lone parent households as a share of households with dependent children"
    description: "Proportion of households with dependent children that are headed by a lone parent."
    unit: "proportion"
    higher_is: null
    source_id: "ons.census2021"
    available_at: ["lsoa21", "msoa21", "ward24", "ltla24", "utla24", "region", "country"]
    refresh_cadence: "decennial"

  # ---------------------------------------------------------------------------
  # Deprivation (England — IoD 2025)
  # ---------------------------------------------------------------------------

  - key: deprivation.imd.score
    label: "Index of Multiple Deprivation 2025 score"
    description: "Combined IMD 2025 score. Higher score indicates greater relative deprivation."
    unit: "score"
    higher_is: "worse"
    source_id: "mhclg.imd2025"
    available_at: ["lsoa21", "ltla24", "utla24"]
    refresh_cadence: "every 5-7 years"
    caveats:
      - "Scores are relative to the English national distribution; not directly comparable across UK nations."
      - "series_break: IoD 2025 changes datasets and methodology versus IoD 2019. Direct comparison across editions is not recommended."
    related_keys:
      - "deprivation.imd.decile"
      - "deprivation.imd.income_score"
      - "deprivation.imd.employment_score"
      - "deprivation.imd.health_score"

  - key: deprivation.imd.decile
    label: "Index of Multiple Deprivation 2025 decile"
    description: "Decile of the IMD 2025 score, where 1 = most deprived 10% nationally and 10 = least deprived."
    unit: "decile (1-10)"
    higher_is: "better"
    source_id: "mhclg.imd2025"
    available_at: ["lsoa21"]
    refresh_cadence: "every 5-7 years"
    caveats:
      - "Decile is a ranking, not a measure of magnitude. A neighbourhood in decile 1 in two consecutive releases may have changed substantially."
      - "series_break: IoD 2025 changes datasets and methodology versus IoD 2019. Direct comparison across editions is not recommended."

  - key: deprivation.imd.income_score
    label: "IMD 2025 Income Deprivation domain score"
    description: "Proportion of the population experiencing deprivation related to low income."
    unit: "proportion"
    higher_is: "worse"
    source_id: "mhclg.imd2025"
    available_at: ["lsoa21", "ltla24"]
    refresh_cadence: "every 5-7 years"
    caveats:
      - "series_break: IoD 2025 changes datasets and methodology versus IoD 2019. Direct comparison across editions is not recommended."

  - key: deprivation.imd.employment_score
    label: "IMD 2025 Employment Deprivation domain score"
    description: "Proportion of the working-age population involuntarily excluded from the labour market."
    unit: "proportion"
    higher_is: "worse"
    source_id: "mhclg.imd2025"
    available_at: ["lsoa21", "ltla24"]
    refresh_cadence: "every 5-7 years"
    caveats:
      - "series_break: IoD 2025 changes datasets and methodology versus IoD 2019. Direct comparison across editions is not recommended."

  - key: deprivation.imd.health_score
    label: "IMD 2025 Health Deprivation and Disability domain score"
    description: "Risk of premature death and impairment of quality of life through poor physical or mental health."
    unit: "score"
    higher_is: "worse"
    source_id: "mhclg.imd2025"
    available_at: ["lsoa21", "ltla24"]
    refresh_cadence: "every 5-7 years"
    caveats:
      - "series_break: IoD 2025 changes datasets and methodology versus IoD 2019. Direct comparison across editions is not recommended."

  - key: deprivation.imd.education_score
    label: "IMD 2025 Education, Skills and Training domain score"
    description: "Lack of attainment and skills among the local population."
    unit: "score"
    higher_is: "worse"
    source_id: "mhclg.imd2025"
    available_at: ["lsoa21", "ltla24"]
    refresh_cadence: "every 5-7 years"
    caveats:
      - "series_break: IoD 2025 changes datasets and methodology versus IoD 2019. Direct comparison across editions is not recommended."

  - key: deprivation.idaci
    label: "Income Deprivation Affecting Children Index (IDACI) 2025"
    description: "Proportion of children aged 0–15 living in income-deprived families."
    unit: "proportion"
    higher_is: "worse"
    source_id: "mhclg.imd2025"
    available_at: ["lsoa21", "ltla24"]
    refresh_cadence: "every 5-7 years"
    caveats:
      - "series_break: IoD 2025 changes datasets and methodology versus IoD 2019. Direct comparison across editions is not recommended."

  - key: deprivation.idaopi
    label: "Income Deprivation Affecting Older People Index (IDAOPI) 2025"
    description: "Proportion of those aged 60+ living in income-deprived households."
    unit: "proportion"
    higher_is: "worse"
    source_id: "mhclg.imd2025"
    available_at: ["lsoa21", "ltla24"]
    refresh_cadence: "every 5-7 years"
    caveats:
      - "series_break: IoD 2025 changes datasets and methodology versus IoD 2019. Direct comparison across editions is not recommended."

  - key: deprivation.child_poverty_ahc
    label: "Children in low-income families (after housing costs)"
    description: "Number and percentage of children aged under 16 in households with relative low income (below 60% of median, after housing costs)."
    unit: "proportion"
    higher_is: "worse"
    source_id: "dwp.statxplore"
    available_at: ["ltla24", "utla24", "westminster_constituency_24"]
    refresh_cadence: "annual"
    caveats:
      - "Local-area child poverty AHC statistics published from FYE 2024 onwards following DWP discovery work."
      - "Three-year averages recommended for sub-regional series due to sample noise."

  # ---------------------------------------------------------------------------
  # Economy
  # ---------------------------------------------------------------------------

  - key: economy.employment_rate
    label: "Employment rate (16–64)"
    description: "Proportion of the working-age population in employment."
    unit: "proportion"
    higher_is: "better"
    source_id: "ons.aps"
    available_at: ["ltla24", "utla24", "region", "country"]
    refresh_cadence: "quarterly"
    caveats:
      - "Survey estimate. Confidence intervals widen at LTLA level."

  - key: economy.unemployment_rate
    label: "Unemployment rate (16+)"
    description: "ILO-defined unemployment as a proportion of the economically active."
    unit: "proportion"
    higher_is: "worse"
    source_id: "ons.aps"
    available_at: ["ltla24", "utla24", "region", "country"]
    refresh_cadence: "quarterly"

  - key: economy.claimant_count_rate
    label: "Claimant count rate (16-64)"
    description: "People claiming Jobseeker's Allowance plus Universal Credit claimants required to seek work, as a proportion of the resident population aged 16–64."
    unit: "proportion"
    higher_is: "worse"
    source_id: "dwp.statxplore"
    available_at: ["ltla24", "utla24", "westminster_constituency_24", "region", "country"]
    refresh_cadence: "monthly"

  - key: economy.median_pay_resident
    label: "Median weekly pay (resident-based)"
    description: "Median gross weekly pay for full-time workers resident in the area."
    unit: "GBP per week"
    higher_is: "better"
    source_id: "ons.aps"
    available_at: ["ltla24", "utla24", "region", "country"]
    refresh_cadence: "annual"

  - key: economy.universal_credit_claimants
    label: "People on Universal Credit"
    description: "Number of people on Universal Credit at the count date."
    unit: "people"
    higher_is: null
    source_id: "dwp.statxplore"
    available_at: ["ltla24", "utla24", "westminster_constituency_24", "region", "country"]
    refresh_cadence: "monthly"

  - key: economy.active_companies_count
    label: "Active companies"
    description: "Count of companies on the live register with a registered office in the area."
    unit: "companies"
    higher_is: null
    source_id: "companies_house"
    available_at: ["ltla24", "utla24"]
    refresh_cadence: "monthly"
    caveats:
      - "Counted by registered-office postcode, which may differ from where a company trades."
      - "Live register only; dissolved companies are excluded from the free data product."

  - key: economy.active_companies_per_1000
    label: "Active companies per 1,000 residents"
    description: "Active companies per 1,000 resident population (registered-office basis)."
    unit: "per 1,000 population"
    higher_is: null
    source_id: "companies_house"
    available_at: ["ltla24", "utla24"]
    refresh_cadence: "monthly"
    caveats:
      - "Registered-office basis; not a measure of business activity or employment."

  - key: economy.new_incorporations_12m
    label: "New company incorporations (last 12 months)"
    description: "Companies incorporated in the 12 months to the snapshot date, by registered-office area."
    unit: "companies"
    higher_is: null
    source_id: "companies_house"
    available_at: ["ltla24", "utla24"]
    refresh_cadence: "monthly"
    caveats:
      - "Derived from IncorporationDate within the live-register snapshot; companies incorporated then dissolved within the window are not counted."

  # ---------------------------------------------------------------------------
  # Health and wellbeing (Fingertips selection)
  # ---------------------------------------------------------------------------

  - key: health.life_expectancy.female
    label: "Life expectancy at birth, female"
    description: "Expected years of life at birth for females."
    unit: "years"
    higher_is: "better"
    source_id: "ohid.fingertips"
    available_at: ["ltla24", "utla24", "region", "country"]
    refresh_cadence: "annual (rolling 3-year averages)"

  - key: health.life_expectancy.male
    label: "Life expectancy at birth, male"
    description: "Expected years of life at birth for males."
    unit: "years"
    higher_is: "better"
    source_id: "ohid.fingertips"
    available_at: ["ltla24", "utla24", "region", "country"]
    refresh_cadence: "annual (rolling 3-year averages)"

  - key: health.healthy_life_expectancy.female
    label: "Healthy life expectancy at birth, female"
    description: "Expected years of life in good general health for females."
    unit: "years"
    higher_is: "better"
    source_id: "ohid.fingertips"
    available_at: ["utla24", "region", "country"]
    refresh_cadence: "annual"

  - key: health.healthy_life_expectancy.male
    label: "Healthy life expectancy at birth, male"
    description: "Expected years of life in good general health for males."
    unit: "years"
    higher_is: "better"
    source_id: "ohid.fingertips"
    available_at: ["utla24", "region", "country"]
    refresh_cadence: "annual"

  - key: health.long_term_conditions_share
    label: "Adults with limiting long-term illness or disability"
    description: "Proportion of adults reporting a long-term illness or disability that limits day-to-day activities."
    unit: "proportion"
    higher_is: "worse"
    source_id: "ons.census2021"
    available_at: ["lsoa21", "msoa21", "ward24", "ltla24", "utla24", "region", "country"]
    refresh_cadence: "decennial"

  - key: health.under_75_mortality.preventable
    label: "Under-75 mortality from causes considered preventable"
    description: "Age-standardised rate of under-75 mortality from causes considered preventable, per 100,000."
    unit: "per 100,000"
    higher_is: "worse"
    source_id: "ohid.fingertips"
    available_at: ["ltla24", "utla24", "region", "country"]
    refresh_cadence: "annual"

  - key: health.smoking_prevalence
    label: "Smoking prevalence in adults (18+)"
    description: "Proportion of adults aged 18+ who report current smoking (APS-derived)."
    unit: "proportion"
    higher_is: "worse"
    source_id: "ohid.fingertips"
    available_at: ["ltla24", "utla24", "region", "country"]
    refresh_cadence: "annual"

  # ---------------------------------------------------------------------------
  # Education
  # ---------------------------------------------------------------------------

  - key: education.fsm_eligibility_share
    label: "Pupils eligible for free school meals"
    description: "Proportion of state-funded school pupils eligible for free school meals."
    unit: "proportion"
    higher_is: "worse"
    source_id: "dfe.explore"
    available_at: ["ltla24", "utla24", "region", "country"]
    refresh_cadence: "annual"

  - key: education.ks4_attainment_8
    label: "Attainment 8 score, average per pupil"
    description: "Average Attainment 8 score for state-funded school pupils at the end of KS4."
    unit: "score"
    higher_is: "better"
    source_id: "dfe.explore"
    available_at: ["ltla24", "utla24", "region", "country"]
    refresh_cadence: "annual"

  - key: education.persistent_absence_share
    label: "Persistent absence rate"
    description: "Proportion of state-funded school pupils missing 10% or more of possible sessions."
    unit: "proportion"
    higher_is: "worse"
    source_id: "dfe.explore"
    available_at: ["ltla24", "utla24", "region", "country"]
    refresh_cadence: "annual"

  - key: education.no_qualifications_share
    label: "Adults with no formal qualifications"
    description: "Proportion of adults aged 16+ reporting no formal qualifications (Census 2021)."
    unit: "proportion"
    higher_is: "worse"
    source_id: "ons.census2021"
    available_at: ["lsoa21", "msoa21", "ward24", "ltla24", "utla24", "region", "country"]
    refresh_cadence: "decennial"

  # ---------------------------------------------------------------------------
  # Housing
  # ---------------------------------------------------------------------------

  - key: housing.affordability_ratio
    label: "Housing affordability ratio (workplace-based)"
    description: "Ratio of median house price to median gross workplace-based annual earnings."
    unit: "ratio"
    higher_is: "worse"
    source_id: "ons.aps"
    available_at: ["ltla24", "utla24", "region", "country"]
    refresh_cadence: "annual"
    caveats:
      - "ONS publishes paired with the residence-based ratio; both are useful in different contexts."

  - key: housing.statutory_homelessness_rate
    label: "Statutory homelessness — owed a duty"
    description: "Households assessed as owed a homelessness prevention or relief duty, per 1,000 households."
    unit: "per 1,000 households"
    higher_is: "worse"
    source_id: "mhclg.live_tables"
    available_at: ["ltla24", "region", "country"]
    refresh_cadence: "quarterly"

  - key: housing.temporary_accommodation_rate
    label: "Households in temporary accommodation"
    description: "Households in temporary accommodation at end of period, per 1,000 households."
    unit: "per 1,000 households"
    higher_is: "worse"
    source_id: "mhclg.live_tables"
