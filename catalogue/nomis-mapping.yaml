# catalogue/nomis-mapping.yaml — Nomis dataset/measure pinning per indicator.
#
# `dataset_id` is Nomis's internal identifier (e.g. NM_2010_1 for Mid-Year
# Estimates). Field codes (measures, cell) are Nomis-specific and live here so
# code doesn't have to know them. Treat all entries as `(unverified)` until
# the live test in nightly CI confirms them.
#
# `geography_type_codes` maps a Soundings place type to Nomis's geography
# type code (e.g. lsoa21 → "TYPE298"). The actual `geography=...` query is
# the Soundings code looked up against this type code.

mappings:

  # --- ONS Mid-Year Estimates ----------------------------------------------
  # NM_2002_1 = "Population estimates - local authority based by single year
  # of age" — covers LA-equivalent levels and above. For LSOA21 use NM_2014_1
  # ("Population estimates - small area (2021 based)…"); that requires a
  # separate mapping entry (deferred until needed by an LSOA-level indicator).

  - indicator_key: population.total
    source_id: ons.mid_year_estimates
    dataset_id: NM_2002_1
    measures: "20100"             # value (count of persons)
    geography_type_codes:
      ltla24: TYPE424             # LA: district/unitary (April 2023)
      utla24: TYPE423             # LA: county/unitary  (April 2023)
      region: TYPE480
      country: TYPE499
    extra_params:
      c_age: "0"                  # All Ages
      gender: "0"                 # Total (both sexes)
    period: latest

  - indicator_key: population.density
    source_id: ons.mid_year_estimates
    dataset_id: NM_2002_1
    measures: "20100"
    geography_type_codes:
      ltla24: TYPE424
      utla24: TYPE423
      region: TYPE480
      country: TYPE499
    extra_params:
      c_age: "0"
      gender: "0"
    period: latest

  - indicator_key: population.age_structure.under_18
    source_id: ons.mid_year_estimates
    dataset_id: NM_2002_1
    measures: "20100"
    geography_type_codes:
      ltla24: TYPE424
      utla24: TYPE423
    extra_params:
      c_age: "201"                # Aged 0 to 15 (closest single c_age band;
                                  #   NM_2002_1 has no 0–17 — under_18 share
                                  #   needs a post-process step. Tracked in
                                  #   PLAN.md open questions.)
      gender: "0"
    period: latest

  - indicator_key: population.age_structure.over_65
    source_id: ons.mid_year_estimates
    dataset_id: NM_2002_1
    measures: "20100"
    geography_type_codes:
      ltla24: TYPE424
      utla24: TYPE423
    extra_params:
      c_age: "209"                # Aged 65+
      gender: "0"
    period: latest

  # --- ONS Census 2021 -----------------------------------------------------
  # Each TS table maps to a Nomis dataset id; only one is currently exercised
  # by the live test (TS003 → lone_parent_share). The others are pinned as
  # plausible-but-unverified — when added to an integration test or used by
  # a tool, confirm the cell code against the dataset's hhcomp / qualif /
  # tenure / ethnicgroup codelists. value_scale=0.01 turns measures=20301
  # (percent, 0–100) into a fraction in [0,1] to match indicator contracts.

  - indicator_key: population.ethnicity.non_white_british_share
    source_id: ons.census2021
    dataset_id: NM_2041_1         # TS021 - Ethnic group (unverified)
    measures: "20301"
    geography_type_codes:
      ltla24: TYPE424
    period: "2021"
    value_scale: 0.01

  - indicator_key: population.households.total
    source_id: ons.census2021
    dataset_id: NM_2023_1         # TS003 - Household composition (total)
    measures: "20100"
    geography_type_codes:
      ltla24: TYPE424
    extra_params:
      c2021_hhcomp_15: "0"        # Total: All households
    period: "2021"

  - indicator_key: population.households.lone_parent_share
    source_id: ons.census2021
    dataset_id: NM_2023_1         # TS003 - Household composition
    measures: "20301"             # percent
    geography_type_codes:
      ltla24: TYPE424
    extra_params:
      c2021_hhcomp_15: "1005"     # Single family household: Lone parent family
    period: "2021"
    value_scale: 0.01

  - indicator_key: health.long_term_conditions_share
    source_id: ons.census2021
    dataset_id: NM_2055_1         # TS038 - Disability (unverified)
    measures: "20301"
    geography_type_codes:
      ltla24: TYPE424
    period: "2021"
    value_scale: 0.01

  - indicator_key: education.no_qualifications_share
    source_id: ons.census2021
    dataset_id: NM_2062_1         # TS067 - Highest level of qualification (unverified)
    measures: "20301"
    geography_type_codes:
      ltla24: TYPE424
    period: "2021"
    value_scale: 0.01

  - indicator_key: housing.social_rented_share
    source_id: ons.census2021
    dataset_id: NM_2072_1         # TS054 - Tenure (unverified)
    measures: "20301"
    geography_type_codes:
      ltla24: TYPE424
    period: "2021"
    value_scale: 0.01

  - indicator_key: housing.overcrowding_share
    source_id: ons.census2021
    dataset_id: NM_2075_1         # TS052 - Occupancy rating for bedrooms (unverified)
    measures: "20301"
    geography_type_codes:
      ltla24: TYPE424
    period: "2021"
    value_scale: 0.01

  # --- ONS Annual Population Survey (Phase 3 Block F) ----------------------
  # APS is delivered via Nomis; `OnsApsAdapter` is a passthrough that pulls
  # the most recent 20 quarterly periods (`time=latestMINUS19-latest`) per
  # request. Field codes below are plausible-but-unverified pending the live
  # test in `tests/live/test_aps_live.py` — Nomis APS uses a variable-coded
  # schema and the live response is the only reliable way to confirm them.
  # value_scale=0.01 turns Nomis percent (0–100) into a fraction (0–1) for
  # rate-shaped indicators.

  - indicator_key: economy.employment_rate
    source_id: ons.aps
    dataset_id: NM_17_5           # APS - variables (percentages)
    measures: "20599"             # Variable (the rate value itself)
    geography_type_codes:
      ltla24: TYPE424
      utla24: TYPE423
      region: TYPE480
      country: TYPE499
    extra_params:
      variable: "45"              # Employment rate - aged 16-64
    value_scale: 0.01

  - indicator_key: economy.unemployment_rate
    source_id: ons.aps
    dataset_id: NM_17_5
    measures: "20599"
    geography_type_codes:
      ltla24: TYPE424
      utla24: TYPE423
      region: TYPE480
      country: TYPE499
    extra_params:
      variable: "84"              # Unemployment rate - aged 16-64
    value_scale: 0.01

  - indicator_key: economy.median_pay_resident
    source_id: ons.aps
    dataset_id: NM_30_1           # ASHE resident analysis (unverified)
    measures: "20100"
    geography_type_codes:
      ltla24: TYPE424
      utla24: TYPE423
      region: TYPE480
      country: TYPE499
    extra_params:
      sex: "7"
      item: "2"                   # Weekly pay - gross (unverified)
      pay: "7"                    # Median

  - indicator_key: housing.affordability_ratio
    source_id: ons.aps
    dataset_id: NM_173_1          # ONS workplace-based affordability (unverified)
    measures: "20100"
    geography_type_codes:
      ltla24: TYPE424
      utla24: TYPE423
      region: TYPE480
      country: TYPE499
