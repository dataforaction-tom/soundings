# catalogue/sources.yaml — v1 sources, pinned per design 2026-05-05 §3.
# Each entry includes: mode (loader|passthrough), refresh policy, licence,
# publisher metadata for SourceRef construction.

sources:
  - id: ons.geography
    label: ONS Open Geography Portal
    publisher: Office for National Statistics
    publisher_url: https://geoportal.statistics.gov.uk/
    dataset_url: https://geoportal.statistics.gov.uk/
    licence: OGL-UK-3.0
    mode: loader
    refresh_cadence: "0 2 1 */3 *"
    rate_limit: { rps: 4 }

  - id: postcodes.io
    label: postcodes.io
    publisher: postcodes.io
    publisher_url: https://postcodes.io/
    dataset_url: https://api.postcodes.io/
    licence: MIT
    mode: passthrough
    ttl_hours: 720
    rate_limit: { rps: 10 }

  - id: ons.census2021
    label: ONS Census 2021
    publisher: Office for National Statistics
    publisher_url: https://www.ons.gov.uk/census
    dataset_url: https://www.nomisweb.co.uk/
    licence: OGL-UK-3.0
    mode: loader
    refresh_cadence: "0 2 1 1 *"
    rate_limit: { rps: 2 }

  - id: ons.aps
    label: ONS Annual Population Survey
    publisher: Office for National Statistics
    publisher_url: https://www.ons.gov.uk/
    dataset_url: https://www.nomisweb.co.uk/
    licence: OGL-UK-3.0
    mode: passthrough
    ttl_hours: 24
    rate_limit: { rps: 2 }

  - id: mhclg.imd2025
    label: English Indices of Deprivation 2025
    publisher: Ministry of Housing, Communities and Local Government
    publisher_url: https://www.gov.uk/government/statistics/english-indices-of-deprivation-2025
    dataset_url: https://www.gov.uk/government/statistics/english-indices-of-deprivation-2025
    licence: OGL-UK-3.0
    mode: loader
    refresh_cadence: "0 3 1 * *"

  - id: mhclg.imd2019
    label: English Indices of Deprivation 2019
    publisher: Ministry of Housing, Communities and Local Government
    publisher_url: https://www.gov.uk/government/statistics/english-indices-of-deprivation-2019
    dataset_url: https://www.gov.uk/government/statistics/english-indices-of-deprivation-2019
    licence: OGL-UK-3.0
    mode: loader
    refresh_cadence: "0 3 1 1 *"

  - id: ons.mid_year_estimates
    label: ONS Mid-Year Population Estimates
    publisher: Office for National Statistics
    publisher_url: https://www.ons.gov.uk/peoplepopulationandcommunity/populationandmigration/populationestimates
    dataset_url: https://www.nomisweb.co.uk/
    licence: OGL-UK-3.0
    mode: loader
    refresh_cadence: "0 2 1 7 *"
    rate_limit: { rps: 2 }

  - id: mhclg.live_tables
    label: MHCLG Live Tables
    publisher: Ministry of Housing, Communities and Local Government
    publisher_url: https://www.gov.uk/government/statistical-data-sets
    dataset_url: https://www.gov.uk/government/statistical-data-sets
    licence: OGL-UK-3.0
    mode: loader
    refresh_cadence: "0 4 * * 1"

  - id: dwp.statxplore
    label: DWP Stat-Xplore
    publisher: Department for Work and Pensions
    publisher_url: https://stat-xplore.dwp.gov.uk/
    dataset_url: https://stat-xplore.dwp.gov.uk/webapi/online-help/
    licence: OGL-UK-3.0
    mode: passthrough
    ttl_hours: 24
    rate_limit: { rps: 2 }

  - id: ohid.fingertips
    label: OHID Fingertips
    publisher: Office for Health Improvement and Disparities
    publisher_url: https://fingertips.phe.org.uk/
    dataset_url: https://fingertips.phe.org.uk/api
    licence: OGL-UK-3.0
    mode: passthrough
    ttl_hours: 24
    rate_limit: { rps: 4 }

  - id: dfe.explore
    label: Explore Education Statistics
    publisher: Department for Education
    publisher_url: https://explore-education-statistics.service.gov.uk/
    dataset_url: https://content.explore-education-statistics.service.gov.uk/api/
    licence: OGL-UK-3.0
    mode: passthrough
    ttl_hours: 24
    rate_limit: { rps: 2 }

  - id: police_uk
    label: data.police.uk
    publisher: Home Office
    publisher_url: https://data.police.uk/
    dataset_url: https://data.police.uk/docs/
    licence: OGL-UK-3.0
    mode: passthrough
    ttl_hours: 24
    rate_limit: { rps: 10 }

  - id: charity_commission
    label: Charity Commission Register
    publisher: Charity Commission for England and Wales
    publisher_url: https://register-of-charities.charitycommission.gov.uk/
    dataset_url: https://register-of-charities.charitycommission.gov.uk/register/full-register-download
    licence: OGL-UK-3.0
    mode: loader
    # CC publishes the bulk register monthly (typically mid-month). Cron on
    # the 18th at 04:00 UTC gives a few days' buffer. Daily would be wasteful
    # — there's nothing new to pull until the next monthly publication.
    refresh_cadence: "0 4 18 * *"

  - id: companies_house
    label: Companies House — Free Company Data Product
    publisher: Companies House
    publisher_url: https://www.gov.uk/government/organisations/companies-house
    dataset_url: https://download.companieshouse.gov.uk/en_output.html
    licence: OGL-UK-3.0
    mode: loader
    # CH publishes the bulk product within ~5 working days of month end.
    # Cron on the 7th at 05:00 UTC gives buffer; monthly cadence — nothing
    # new to pull until the next publication.
    refresh_cadence: "0 5 7 * *"
    rate_limit: { rps: 4 }

  - id: threesixtygiving
    label: 360Giving Datastore
    publisher: 360Giving
    publisher_url: https://www.threesixtygiving.org/
    dataset_url: https://grantnav.threesixtygiving.org/
    licence: CC-BY-4.0
    mode: loader
    refresh_cadence: "0 5 * * 0"

  - id: find_that_charity
    label: Find That Charity
    publisher: Find That Charity
    publisher_url: https://findthatcharity.uk/
    dataset_url: https://findthatcharity.uk/about
    licence: CC-BY-SA-4.0
    mode: passthrough
    ttl_hours: 168
    rate_limit: { rps: 4 }

  - id: openaq
    label: OpenAQ
    publisher: OpenAQ
    publisher_url: https://openaq.org/
    dataset_url: https://api.openaq.org/v3/
    licence: CC-BY-4.0
    mode: passthrough
    ttl_hours: 1
    rate_limit: { rps: 4 }

  - id: openweather
    label: OpenWeather Air Pollution
    publisher: OpenWeather
    publisher_url: https://openweathermap.org/
    dataset_url: https://openweathermap.org/api/air-pollution
    licence: CC-BY-SA-4.0
    mode: passthrough
    ttl_hours: 1
    rate_limit: { rps: 4 }

  - id: foe.green_space
    label: Friends of the Earth — Green Space Consolidated Data
    publisher: Friends of the Earth
    publisher_url: https://friendsoftheearth.uk/nature/green-space-consolidated-data-england
    dataset_url: https://friendsoftheearth.uk/nature/green-space-consolidated-data-england
    licence: OGL-UK-3.0
    mode: loader
    # FoE refreshes this consolidated dataset every couple of years; check
    # mid-year. Cron on the 12th at 06:00 UTC.
    refresh_cadence: "0 6 12 1 *"
    rate_limit: { rps: 2 }

  - id: ons.nspl
    label: ONS National Statistics Postcode Lookup (NSPL)
    publisher: Office for National Statistics
    publisher_url: https://geoportal.statistics.gov.uk/
    dataset_url: https://geoportal.statistics.gov.uk/datasets/7668e0d35cab4f6db6f15f03be610fb0
    licence: OGL-UK-3.0
    mode: loader
    # NSPL is published quarterly (Feb/May/Aug/Nov). Refresh a few weeks after
    # each release; also runnable on demand via the full seed or
    # `--once ons.nspl`. Bump `nspl_url` in config when a new release lands.
    refresh_cadence: "0 4 20 2,5,8,11 *"
    rate_limit: { rps: 1 }

  - id: osm_overpass
    label: OpenStreetMap (Overpass API)
    publisher: OpenStreetMap contributors
    publisher_url: https://www.openstreetmap.org/
    dataset_url: https://overpass-api.de/api/interpreter
    licence: ODbL-1.0
    mode: passthrough
    ttl_hours: 720
    # Monthly warm pass, matching the 30-day cache TTL. The pre_warmer daemon
    # populates county-wide amenity counts out-of-band so user reads stay warm.
    refresh_cadence: "0 3 1 * *"
    rate_limit: { rps: 2 }

  - id: givefood
    label: Give Food
    publisher: Give Food
    publisher_url: https://www.givefood.org.uk/
    dataset_url: https://www.givefood.org.uk/api/2/docs/
    licence: "Give Food terms - attribution required"
    mode: passthrough
    ttl_hours: 24
    # Daily warm pass — the dump updates daily; the pre_warmer warms the dump
    # and per-LTLA counts so user reads stay warm.
    refresh_cadence: "0 4 * * *"
    rate_limit: { rps: 1 }
