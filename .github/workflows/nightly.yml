name: nightly

on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC daily
  workflow_dispatch:

jobs:
  live-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: soundings
          POSTGRES_USER: soundings
          POSTGRES_PASSWORD: changeme-locally
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U soundings"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.12"
      - run: cd server && uv sync --frozen
      - name: Install spaCy NER model
        run: cd server && uv run python -m spacy download en_core_web_sm
      - name: Bootstrap extensions and schemas
        env:
          PGPASSWORD: changeme-locally
        run: |
          psql -h localhost -U soundings -d soundings -f infra/initdb/00-extensions.sql
          psql -h localhost -U soundings -d soundings -f infra/initdb/01-schemas.sql
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://soundings:changeme-locally@localhost:5432/soundings
        run: cd server && uv run alembic upgrade head
      - name: Live API tests
        env:
          DATABASE_URL: postgresql+asyncpg://soundings:changeme-locally@localhost:5432/soundings
          # API keys for sources that gate on auth. The Stat-Xplore + APS
          # tests skip cleanly without a key; CC doesn't need one (bulk
          # download is anonymous) but the key is plumbed for future
          # per-charity detail enrichment work.
          STATXPLORE_API_KEY: ${{ secrets.STATXPLORE_API_KEY }}
          NOMIS_API_KEY: ${{ secrets.NOMIS_API_KEY }}
          CHARITY_COMMISSION_API_KEY: ${{ secrets.CHARITY_COMMISSION_API_KEY }}
        run: cd server && uv run pytest -m live
