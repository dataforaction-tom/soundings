name: soundings

services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: soundings
      POSTGRES_USER: soundings
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "soundings", "-d", "soundings"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: infra/Dockerfile.server
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://soundings:${POSTGRES_PASSWORD}@postgres:5432/soundings"
    ports:
      - "127.0.0.1:8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  loader:
    image: soundings-server
    build:
      context: .
      dockerfile: infra/Dockerfile.server
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://soundings:${POSTGRES_PASSWORD}@postgres:5432/soundings"
    command: ["python", "-m", "soundings.loader.run"]
    restart: unless-stopped

  pre_warmer:
    # Phase 4 onwards. Pre-populates cache.source_cache for passthrough
    # adapters that publish slow-changing aggregates (CC, 360G) so
    # user-facing reads hit warm cache. Same image as server / loader,
    # different entrypoint.
    image: soundings-server
    build:
      context: .
      dockerfile: infra/Dockerfile.server
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://soundings:${POSTGRES_PASSWORD}@postgres:5432/soundings"
    command: ["python", "-m", "soundings.pre_warmer.run"]
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: infra/Dockerfile.ui
    depends_on:
      server:
        condition: service_healthy
    environment:
      SOUNDINGS_API_BASE: "http://server:8000"
    ports:
      - "127.0.0.1:4321:4321"
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - server
      - ui
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    ports:
      - "127.0.0.1:8088:80"

volumes:
  pgdata:
  caddy_data:
